server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA-фолбэк
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API на бэкенд-сервис.
    # Docker DNS (127.0.0.11) + переменная в proxy_pass: nginx ре-резолвит хост
    # на каждый запрос, поэтому смена IP контейнера api не приводит к 502.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream api;
        proxy_pass http://$api_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
